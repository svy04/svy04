name: Profile README

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run profile README unit tests
        run: python -m unittest discover -s tests -v

      - name: Check profile README claim surface
        run: python scripts/check_profile_readme.py

      - name: Check profile README live links
        run: python scripts/check_profile_readme.py --check-links
