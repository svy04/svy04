name: Profile README

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run profile README unit tests
        run: python -m unittest discover -s tests -v

      - name: Check profile README claim surface
        run: python scripts/check_profile_readme.py

      - name: Check profile README live links
        run: python scripts/check_profile_readme.py --check-links

      - name: Check profile rendered parity
        if: github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python scripts/check_profile_render_parity.py

      - name: Check public GitHub surface hygiene
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/check_public_github_surface_hygiene.py
          python scripts/check_public_github_surface_hygiene.py --repo svy04 --include-non-default-branches
